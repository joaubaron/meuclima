<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Dia dos Namorados, Cláudia 💌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:     #C8445A;
    --blush:    #F2CACE;
    --petal:    #FAF0EF;
    --ink:      #2C1A1E;
    --gold:     #C9934A;
    --envelope: #E8B8BE;
  }

  body {
    min-height: 100vh;
    background: var(--petal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
  }

  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .petal {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50% 0 50% 0;
    background: var(--rose);
    opacity: 0;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: .5; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  .scene {
    position: relative;
    z-index: 1;
    width: min(92vw, 460px);
    cursor: pointer;
    perspective: 800px;
  }

  .envelope {
    width: 100%;
    aspect-ratio: 3/2;
    position: relative;
    transform-style: preserve-3d;
  }

  .envelope-body {
    width: 100%;
    height: 100%;
    background: var(--envelope);
    border-radius: 6px 6px 10px 10px;
    position: relative;
    box-shadow: 0 8px 40px rgba(200,68,90,.22), 0 2px 8px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .envelope-body::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 55%;
    background: #D8A0A8;
    clip-path: polygon(0 100%, 50% 0, 100% 100%);
  }
  .envelope-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, #D8A0A8 50%, transparent 50%),
      linear-gradient(225deg, #D8A0A8 50%, transparent 50%);
    background-size: 50% 45%;
    background-position: left bottom, right bottom;
    background-repeat: no-repeat;
  }

  .flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    padding-bottom: 52%;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform .6s ease .1s;
    z-index: 3;
  }
  .flap::before {
    content: '';
    position: absolute;
    inset: 0;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: var(--envelope);
    border-bottom: 1px solid #C89098;
  }

  .seal {
    position: absolute;
    top: 48%; left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 52px;
    background: radial-gradient(circle at 38% 38%, #E05060, var(--rose) 70%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    z-index: 4;
    transition: transform .3s ease, box-shadow .3s ease;
    user-select: none;
  }
  .scene:hover .seal {
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow: 0 4px 16px rgba(200,68,90,.4);
  }

  .hint {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--rose);
    letter-spacing: .06em;
    opacity: .8;
    font-weight: 300;
    transition: opacity .3s;
  }
  .scene.open .hint { opacity: 0; pointer-events: none; }

  .scene.open .flap {
    transform: rotateX(-180deg);
  }

  .letter-wrap {
    position: absolute;
    bottom: 10%;
    left: 5%; right: 5%;
    height: 0;
    overflow: hidden;
    transition: height .7s cubic-bezier(.34,1.3,.64,1) .3s;
    z-index: 2;
  }
  .scene.open .letter-wrap {
    height: 500px;
  }

  .letter {
    width: 100%;
    background: #fff;
    border-radius: 4px;
    padding: 24px 22px 20px;
    box-shadow: 0 -4px 24px rgba(0,0,0,.1);
    position: relative;
    transform: translateY(30px);
    opacity: 0;
    transition: transform .5s ease .7s, opacity .5s ease .7s;
  }
  .scene.open .letter {
    transform: translateY(0);
    opacity: 1;
  }

  .letter::before {
    content: '';
    position: absolute;
    inset: 24px 22px;
    background: repeating-linear-gradient(
      transparent,
      transparent 27px,
      #F0E8EA 27px,
      #F0E8EA 28px
    );
    pointer-events: none;
  }

  .letter-header {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 5px;
    position: relative;
    z-index: 1;
  }

  .letter-salutation {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--rose);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .letter-body {
    font-size: 14.5px;
    line-height: 28px;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }

  .letter-signature {
    margin-top: 14px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--rose);
    text-align: right;
    position: relative;
    z-index: 1;
  }

  /* Foto do casal */
  .couple-photo {
    width: 100%;
    height: 110px;
    object-fit: cover;
    object-position: center 45%;
    border-radius: 4px;
    margin-top: 14px;
    display: block;
    position: relative;
    z-index: 1;
    filter: sepia(15%) saturate(1.1);
  }

  .counter {
    margin-top: 12px;
    background: linear-gradient(135deg, var(--rose), #A33248);
    border-radius: 8px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(200,68,90,.3);
    position: relative;
    z-index: 1;
  }
  .counter-icon { font-size: 18px; flex-shrink: 0; }
  .counter-text {
    font-size: 11px;
    color: rgba(255,255,255,.75);
    line-height: 1.3;
    letter-spacing: .04em;
  }
  .counter-number {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: #fff;
    font-weight: 700;
  }

  @media (prefers-reduced-motion: reduce) {
    .petal { animation: none; }
    .flap, .letter, .letter-wrap, .seal { transition: none; }
  }
</style>
</head>

<script>
  const petalsEl = document.getElementById('petals');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 6 + Math.random() * 10;
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${5+Math.random()*8}s;animation-delay:${-Math.random()*12}s;`;
    petalsEl.appendChild(p);
  }

  let opened = false;
  function openLetter() {
    if (opened) return;
    opened = true;
    document.getElementById('scene').classList.add('open');
    updateCounter();
  }

  function updateCounter() {
    const start = new Date('2007-06-05T00:00:00');
    const now   = new Date();

    let years = 0, months = 0, days = 0;
    let d = new Date(start);

    while (true) {
      const ny = new Date(d); ny.setFullYear(ny.getFullYear() + 1);
      if (ny > now) break;
      years++; d = ny;
    }
    while (true) {
      const nm = new Date(d); nm.setMonth(nm.getMonth() + 1);
      if (nm > now) break;
      months++; d = nm;
    }
    days = Math.floor((now - d) / 86400000);

    const parts = [];
    if (years)  parts.push(`${years} ano${years!==1?'s':''}`);
    if (months) parts.push(`${months} ${months!==1?'meses':'mês'}`);
    parts.push(`${days} dia${days!==1?'s':''}`);

    document.getElementById('counter').textContent = parts.join(', ');
  }
</script>
